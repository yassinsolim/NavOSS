appId: org.navoss.mobile
---
- launchApp:
    clearState: true
- openLink: 'exp+navoss://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081'
- waitForAnimationToEnd
- tapOn:
    text: 'Close'
    optional: true
- tapOn:
    text: 'Reload'
    optional: true
- extendedWaitUntil:
    visible: 'Map with .* official safety camera symbols'
    timeout: 20000
- assertVisible: 'Search Calgary'
- takeScreenshot: '/tmp/navoss-camera-marker-icons'
