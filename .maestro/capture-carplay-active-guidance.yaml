appId: org.navoss.mobile
---
- launchApp
- extendedWaitUntil:
    visible: 'Search Calgary'
    timeout: 20000
- tapOn: 'Search Calgary'
- eraseText
- inputText: 'Airport'
- extendedWaitUntil:
    visible: 'Select Calgary International Airport'
    timeout: 20000
- tapOn: 'Select Calgary International Airport'
- extendedWaitUntil:
    visible: 'Start navigation'
    timeout: 20000
- tapOn: 'Start navigation'
- extendedWaitUntil:
    visible: 'End navigation'
    timeout: 20000
- assertVisible: 'Share ETA'
- takeScreenshot: '/tmp/navoss-carplay-active-guidance'
