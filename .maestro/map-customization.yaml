- tapOn: 'Map appearance'
- assertVisible: 'Map appearance'
- assertVisible: 'Auto'
- assertVisible: 'Heading up'
- assertVisible: 'Tilted'
- tapOn: 'Night'
- tapOn: 'Flat'
- tapOn: 'Buildings'
- tapOn: 'Camera markers'
- tapOn: 'Blue route'
- tapOn: 'Close map appearance'
- assertVisible: 'Search Calgary'
- tapOn: 'Map appearance'
- assertVisible:
