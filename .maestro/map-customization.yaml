    selected: true
- assertVisible:
    text: 'Flat'
    selected: true
- assertVisible:
    text: 'Buildings'
    checked: false
- assertVisible:
    text: 'Camera markers'
    checked: false
- assertVisible:
    text: 'Blue route'
    selected: true
- tapOn: 'Close map appearance'
- stopApp
- launchApp
- extendedWaitUntil:
    visible: 'Search Calgary'
    timeout: 20000
- tapOn: 'Map appearance'
- assertVisible:
    text: 'Night'
    selected: true
- assertVisible:
    text: 'Flat'
    selected: true
- assertVisible:
    text: 'Buildings'
    checked: false
- assertVisible:
    text: 'Camera markers'
