appId: org.navoss.mobile
---
- launchApp:
    clearState: true
- openLink: 'exp+navoss://expo-development-client/?url=http%3A%2F%2F127.0.0.1%3A8081'
- waitForAnimationToEnd
- tapOn:
    text: 'Close'
    optional: true
- tapOn:
    text: 'Reload'
    optional: true
- extendedWaitUntil:
    visible: 'Search Calgary'
    timeout: 20000
- tapOn: 'Search Calgary'
- eraseText
- inputText: 'Starbucks'
- extendedWaitUntil:
    visible: 'Select Starbucks.*away.*'
    timeout: 20000
- pressKey: Enter
- assertVisible: 'Select Starbucks.*away.*'
- takeScreenshot: '/tmp/navoss-search-multiple-locations'
