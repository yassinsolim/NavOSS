appId: org.navoss.mobile
---
- launchApp
- extendedWaitUntil:
    visible: 'Search Calgary'
    timeout: 20000
- tapOn: 'Search Calgary'
- eraseText
- inputText: 'Airport'
- assertVisible: 'Select Calgary International Airport'
- tapOn: 'Select Calgary International Airport'
- extendedWaitUntil:
    visible: 'Start navigation'
    timeout: 20000
- tapOn: 'Use car navigation marker'
- tapOn: 'Start navigation'
- assertVisible: 'End navigation'
- assertVisible: '.*Drive.*'
- extendedWaitUntil:
    visible: 'Navigation status, on route.*'
    timeout: 20000
